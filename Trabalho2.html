<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Abastecimento</title>
    <link rel="stylesheet" href="Trabalho2.css">
</head>
<body>

    <div class="container">
        <h1>Calculadora de Abastecimento</h1>

        <div class="tabela">
            <h3>Tabela de Preços</h3>
            <ul>
                <li>Gasolina: R$ 6,69</li>
                <li>Etanol: R$ 5,89</li>
                <li>Diesel: R$ 6,20</li>
            </ul>
        </div>

        <form id="formCombustivel">
            <label for="combustivel">Tipo de Combustível</label>
            <select id="combustivel">
                <option value="">Escolha uma opção</option>
                <option value="gasolina">Gasolina</option>
                <option value="etanol">Etanol</option>
                <option value="diesel">Diesel</option>
            </select>

            <label for="litros">Quantidade (litros)</label>
            <input type="number" id="litros" step="0.1" min="0" placeholder="Ex: 10">

            <button type="submit">Calcular</button>
        </form>

        <div class="resultado-box">
            <h2>Resultado</h2>
            <p id="resultado">R$ 0,00</p>
        </div>
    </div>

    <script src="Trabalho2.js"></script>
</body>
</html>
